<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest WiFi Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #666;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }
        button:hover {
            background-color: #0056b3;
        }
        .error {
            color: red;
            margin-top: 1rem;
            display: none;
        }
        .success {
            color: green;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Guest WiFi Login</h1>
        <form id="loginForm">
            <input type="hidden" id="client_mac" name="client_mac" value="{{ request.args.get('client_mac', '') }}">
            <input type="hidden" id="base_grant_url" name="base_grant_url" value="{{ request.args.get('base_grant_url', '') }}">
            
            <div class="form-group">
                <label for="voucher_code">Voucher Code (Required)</label>
                <input type="text" id="voucher_code" name="voucher_code" required>
            </div>
            
            <div class="form-group">
                <label for="room_number">Room Number (Optional)</label>
                <input type="text" id="room_number" name="room_number">
            </div>
            
            <button type="submit">Connect</button>
        </form>
        <div id="error-msg" class="error"></div>
        <div id="success-msg" class="success"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const voucher_code = document.getElementById('voucher_code').value;
            const client_mac = document.getElementById('client_mac').value;
            const base_grant_url = document.getElementById('base_grant_url').value;
            
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            if (!client_mac || !base_grant_url) {
                errorMsg.textContent = "Error: Missing network information (MAC or Grant URL). Ensure you connect via the captive portal.";
                errorMsg.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/voucher/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        voucher_code: voucher_code,
                        client_mac: client_mac,
                        base_grant_url: base_grant_url
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    successMsg.textContent = "Access granted! Redirecting...";
                    successMsg.style.display = 'block';
                    // The device should now have internet access. We could redirect them to a success page or the originally requested URL.
                    setTimeout(() => {
                        window.location.href = "https://www.google.com"; // Example redirect after successful connection
                    }, 2000);
                } else {
                    errorMsg.textContent = result.error || "An error occurred";
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = "Failed to connect to the server.";
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
